<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webmart</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="navbar">
  <div class="navbar__container">
    <img class="navbar__logo" src="assets/images/webmart-logo-gip.png" alt="Webmart logo">

    <nav class="navbar__nav">
      <button class="menu-btn" aria-label="Open menu">☰</button>

      <ul class="navbar__links">
        <li><a href="about-us.html">About Us</a></li>
        <li><a href="products.html">Products</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>

  <!-- Hero -->
  <section class="hero">
    <h1 class="hero__title">Websites Store</h1>
    <p class="hero__subtitle">
      Find the best place to advertise your products
    </p>
    <a class="hero__button" href="products.html">Check it out</a>
  </section>

  <!-- Modal trigger -->
  <section class="cta">
    <button class="open-modal" type="button">Subscribe</button>
  </section>

  <!-- Modal -->
  <div class="modal" role="dialog" aria-hidden="true">
    <div class="modal__content">
      <p>Subscribe to our service</p>
      <button class="close-modal" type="button">Close</button>
    </div>
  </div>

  <!-- Form -->
  <section class="form-section">
    <form class="form">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Your name">

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Your email">

      <button type="submit">Submit</button>
    </form>

    <p class="error"></p>
  </section>

</main>

<!-- Dark mode -->
<button class="dark-mode-btn" type="button">🌙</button>

<footer class="footer">
  ©2026 Webmart
</footer>

<script src="js/script.js"></script>
</body>
</html>
