<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webmart*</title>
    <link rel="stylesheet" href="css/style.css"> 
</head>

<body>
    <!-- Navibar -->
    <header class="navbar"> 
        <img class="navbar__logo" src="assets/images/webmart-logo-gip.png" alt="Webmart logo">
        <nav>
            <ul class="navbar__links">
                <li><a class="navbar__home" href="index.html">Home</a></li>
                <li><a class="navbar__about-us" href="about-us.html">About Us</a></li>
            </ul>
        </nav>
    </section>

      <!-- Cards Section (reuse your work) -->
     
        <section class="cards">
            <div class="card">
                <h2 class="card__title">Basic Plan</h2>
                <p class="card__description">Advertise up to 5 (five) products</p>
            </div>
            
            <div class="card card--pro">
                <h2 class="card__title">Pro Plan</h2>
                <p class="card__description">Advertise up to 10 (ten) products</p>
            </div>
            
            <div class="card card--enterprise">
                <h2 class="card__title">Enterprise Plan</h2>
                <p class="card__description">Advertise up to 20 (twenty) products</p>
            </div>
        </section>

        <!-- Footer -->
 <footer class="footer">©2026 Webmart</footer>
     
</body>
</html>
